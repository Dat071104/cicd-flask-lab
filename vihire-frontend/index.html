<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ViHire Frontend</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #172033;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 32px));
        border: 1px solid #d7deea;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 12px 32px rgba(23, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ViHire Frontend</h1>
      <p>Sample frontend service for the metadata-driven Jenkins and Docker platform lab.</p>
    </main>
  </body>
</html>
