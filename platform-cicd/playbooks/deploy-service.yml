---
- name: Deploy selected service with Docker Compose
  hosts: all
  gather_facts: false

  vars:
    compose_remote_file: "{{ deploy_path }}/{{ compose_template }}"

  tasks:
    - name: Ensure deployment directory exists
      file:
        path: "{{ deploy_path }}"
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0755"

    - name: Ensure compose directory exists
      file:
        path: "{{ deploy_path }}/compose"
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0755"

    - name: Copy Docker Compose template
      copy:
        src: "../{{ compose_template }}"
        dest: "{{ compose_remote_file }}"
        owner: jenkins
        group: jenkins
        mode: "0644"

    - name: Write deployment environment file
      copy:
        dest: "{{ deploy_path }}/.env"
        owner: jenkins
        group: jenkins
        mode: "0644"
        content: |
          SERVICE_NAME={{ service_name }}
          IMAGE_NAME={{ image_name }}
          IMAGE_TAG={{ image_tag }}
          APP_BRANCH={{ app_branch }}
          BUILD_NUMBER={{ build_number }}
          HOST_PORT={{ host_port }}
          CONTAINER_PORT={{ container_port }}

    - name: Pull requested image
      command: docker compose -f "{{ compose_remote_file }}" --env-file "{{ deploy_path }}/.env" pull
      args:
        chdir: "{{ deploy_path }}"

    - name: Start service with Docker Compose
      command: docker compose -f "{{ compose_remote_file }}" --env-file "{{ deploy_path }}/.env" up -d
      args:
        chdir: "{{ deploy_path }}"

    - name: Show running containers
      command: docker compose -f "{{ compose_remote_file }}" --env-file "{{ deploy_path }}/.env" ps
      args:
        chdir: "{{ deploy_path }}"
      register: compose_ps

    - name: Print Docker Compose status
      debug:
        var: compose_ps.stdout_lines